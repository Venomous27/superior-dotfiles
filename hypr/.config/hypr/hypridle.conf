general {
    lock_cmd = pidof hyprlock || hyprlock       # Runs the lock screen UI
    before_sleep_cmd = loginctl lock-session    # Locks before system sleep
    after_sleep_cmd = hyprctl dispatch dpms on  # Emergency wake-up rule
    ignore_dbus_inhibit = false
}

# 1. Screen Lock Listener (3 minutes)
listener {
    timeout = 180
    on-timeout = loginctl lock-session          # Locks your session
}

# 2. Display Power Off Listener (3.5 minutes)
listener {
    timeout = 210                               # 30 seconds after locking
    on-timeout = hyprctl dispatch dpms off      # CUTS MONITOR POWER
    on-resume = hyprctl dispatch dpms on        # WAKES MONITOR ON MOUSE MOVE
}
