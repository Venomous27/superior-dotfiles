general {
    disable_loading_bar = true
    grace = 0
    hide_cursor = true
}

# 🌫️ Background
background {
    monitor =
    path = /home/venom/Pictures/Wallpapers/firewatch.jpg
    blur_passes = 2
    blur_size = 6
    brightness = 0.55
}

# 🌑 Soft dim overlay
shape {
    monitor =
    size = 100%, 100%
    color = rgba(0, 0, 0, 0.35)
    position = 0, 0
    halign = center
    valign = center
}

# 👤 Profile picture (center anchor)
image {
    monitor =
    path = /home/venom/Pictures/venom.JPG
    size = 150
    rounding = -1
    border_size = 2
    border_color = rgba(255,255,255,0.2)
    position = 0, 60
    halign = center
    valign = center
}

# 👤 Username (closer to avatar)
label {
    monitor =
    text = $USER
    font_size = 27
    color = rgba(255,255,255,0.9)
    position = 0, -50
    halign = center
    valign = center
}

# ⏰ Clock
label {
    monitor =
    text = cmd[update:1000] date +"%H:%M"
    font_size = 72
    color = rgba(255,255,255,0.9)
    position = 0, 320
    halign = center
    valign = center
}

# 📅 Date
label {
    monitor =
    text = cmd[update:60000] date +"%A, %d %B"
    font_size = 18
    color = rgba(200,200,200,0.7)
    position = 0, 250
    halign = center
    valign = center
}

# 🔑 Password box (always visible + centered)
input-field {
    monitor =
    size = 360, 55
    outline_thickness = 2
    outer_color = rgba(255,255,255,0.25)
    inner_color = rgba(0,0,0,0.45)
    font_color = rgba(255,255,255,0.95)
    placeholder_text = Enter password...
    fade_on_empty = false
    hide_input = false

    position = 0, -140
    halign = center
    valign = center
}
