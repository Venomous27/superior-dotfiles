########################
### GENERAL SETTINGS ###
########################

general {
    disable_loading_bar = false
    grace = 0
    hide_cursor = true
    no_fade_in = false
}

########################
###     BACKGROUND    ###
########################

background {
    monitor =
    path = /home/venom/Pictures/Wallpapers/dark/IMG_8223.JPG   # or screenshot for a blur effect
    blur_passes = 2
    blur_size = 7
    noise = 0.0117
    contrast = 1.0
    brightness = 0.8
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

########################
###   INPUT FIELD     ###
########################

input-field {
    monitor =
    size = 250, 60
    outline_thickness = 3
    dots_size = 0.26
    dots_spacing = 0.35
    dots_center = true
    outer_color = rgb(151515)
    inner_color = rgb(200, 200, 200)
    font_color = rgb(10, 10, 10)
    fade_on_empty = true
    placeholder_text = <i>Enter password...</i>
    hide_input = false
    position = 0, -120
    halign = center
    valign = center
}

########################
###       CLOCK       ###
########################

label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    color = rgba(255, 255, 255, 1)
    font_size = 90
    font_family = JetBrainsMono Nerd Font Bold
    position = 0, 300
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%A, %B %d")"
    color = rgba(255, 255, 255, 0.8)
    font_size = 22
    font_family = JetBrainsMono Nerd Font
    position = 0, 220
    halign = center
    valign = center
}

########################
###   USER GREETING   ###
########################

label {
    monitor =
    text = Yo, $USER
    color = rgba(255, 255, 255, 0.8)
    font_size = 18
    font_family = JetBrainsMono Nerd Font
    position = 0, -40
    halign = center
    valign = center
}
