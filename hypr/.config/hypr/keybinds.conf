# =========================
# KEYBINDS
# =========================

$mainMod = SUPER

# Enter layout mode
bindr = ALT, TAB, submap, layout

submap = layout

# Press S for scrolling
bind = , S, exec, hyprctl keyword general:layout scrolling

# Press D for dwindle
bind = , D, exec, hyprctl keyword general:layout dwindle

# Escape also exits
bind = , Escape, submap, reset
# Define the default submap
submap = reset

# Apps
bind = $mainMod, Q, exec, kitty
bind = $mainMod, E, exec, thunar
#bind = $mainMod, E, exec, kitty -e spf
bind = $mainMod, SPACE, exec, /home/venom/.config/rofi/scripts/launcher.sh
bind = SUPER SHIFT, E, exec, /home/venom/.config/rofi/scripts/powermenu.sh
bind = $mainMod, B, exec, zen-browser
bind = $mainMod, L, exec, localsend

# Window controls
bind = ALT, grave, killactive                         # Alt+` to kill window
bind = $mainMod, F, fullscreen
bind = $mainMod, T, togglefloating
bind = $mainMod, T, resizeactive, exact 1000 700
bind = $mainMod, T, centerwindow

# Move focus (arrows)
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Move windows
bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d

# Mouse move/resize floating windows
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Wallpaper
bind = $mainMod, W, exec, ~/.config/rofi/scripts/wallpaper.sh

#Themes
bind = $mainMod SHIFT, T, exec, ~/.config/rofi/scripts/theme-switcher.sh

# Screenshot
bind = , Print, exec, hyprshot -m region --raw | satty --filename -

# Clipboard history
bind = $mainMod, V, exec, ~/.config/rofi/scripts/clipboard.sh

# Game mode
bind = $mainMod, G, exec, hyprctl --batch "keyword animations:enabled 0; keyword decoration:blur:enabled 0"
bind = $mainMod SHIFT, G, exec, hyprctl --batch "keyword animations:enabled 1; keyword decoration:blur:enabled 1"

# Volume
bind = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bind = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle

# Brightness
bind = , XF86MonBrightnessUp, exec, brightnessctl set 5%+
bind = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

#Emoji
bind = SUPER, slash, exec, ~/.config/rofimoji/emoji.sh

#Volume
bind = $mainMod ALT_L, L, exec, /home/venom/dotfiles/rofi/.config/rofi/scripts/audio-output.sh

#caelestia
#bind = $mainMod, SPACE, global, caelestia:launcher
#bind = $mainMod SHIFT, S, global, caelestia:sidebar
#bind = $mainMod SHIFT, E, global, caelestia:session
#bind = $mainMod, W, exec, caelestia:wallpaper
#bind = $mainMod SHIFT, L, global, caelestia:lock

#Plugin
bind = SUPER, TAB, gloview:toggle
bind = SUPER SHIFT, TAB, gloview:desktop
bind = SUPER CTRL, TAB, gloview:allworkspaces
bind = SUPER, period, layoutmsg, move +col
bind = SUPER, comma, layoutmsg, move -col
bind = SUPER SHIFT, period, layoutmsg, swapcol r
bind = SUPER SHIFT, comma, layoutmsg, swapcol l
