# =========================
# MONITOR
# =========================
monitor=eDP-1,1920x1080@120,0x0,1

# =========================
# ENV (NVIDIA + Wayland)
# =========================
env = LIBVA_DRIVER_NAME,nvidia
env = XDG_SESSION_TYPE,wayland
env = GBM_BACKEND,nvidia-drm
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = ELECTRON_OZONE_PLATFORM_HINT,auto   # helps Electron apps (e.g. Discord, VS Code) run on Wayland
env = QT_QPA_PLATFORM,wayland             # forces Qt apps onto Wayland properly
env = XCURSOR_THEME,Oxygen 18 White
env = XCURSOR_SIZE,24
env = LANG,en_IN.UTF-8

# =========================
# CURSOR (NVIDIA fix)
# =========================
cursor {
    no_hardware_cursors = true   # NVIDIA GPUs often glitch with hardware cursors on Wayland
}

# =========================
# General/Themes
# =========================

general {
    layout = dwindle
}

decoration {
    active_opacity = 1.0
    inactive_opacity = 0.7
}

source = ~/.config/hypr/themes/current.conf

# =========================
# INPUT
# =========================
input {
    kb_layout = us
    follow_mouse = 1
    sensitivity = 0  
    accel_profile = adaptive 

    touchpad {
        natural_scroll = true
        drag_lock = true          
}
}

# =========================
# LAYOUT
# =========================
dwindle {
    #pseudotile = yes
    #preserve_split = yes
}

# =========================
# AUTOSTART
# =========================
exec-once = hyprpaper
exec-once = nm-applet
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP=Hyprland
exec-once = awww-daemon
exec-once = udiskie &
exec-once = gnome-keyring-daemon --start --components=secrets
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = swaync
exec-once = hypridle
#exec-once = waybar
exec-once = wayle shell
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

# =========================
# WINDOW RULES
# =========================
windowrule = opacity 0.8 0.8, match:class thunar

windowrule = float 1, match:class ^(com.gabm.satty)$
windowrule = size 800 500, match:class ^(com.gabm.satty)$
windowrule = center 1, match:class ^(com.gabm.satty)$

windowrule = opacity 0.8 0.8, match:title ^(Wall-Picker)$
windowrule = match:title ^(Wall-Picker)$
windowrule = match:title ^(Wall-Picker)$


windowrule = float 1, match:class org.pulseaudio.pavucontrol 
windowrule = size 800 500, match:class org.pulseaudio.pavucontrol
windowrule = center 1, match:class org.pulseaudio.pavucontrol

windowrule = float 1, match:class blueman-manager
windowrule = size 800 500, match:class blueman-manager
windowrule = center 1, match:class blueman-manager

layerrule = blur on, match:namespace rofi
layerrule = ignore_alpha 1, match:namespace rofi-wayland

windowrule = float 1, match:class com.github.hluk.copyq 
windowrule = size 800 500, match:class com.github.hluk.copyq
windowrule = center 1, match:class com.github.hluk.copyq

windowrule = float 1, match:class ^(vlc)$
windowrule = size 1000 700, match:class ^(vlc)$
windowrule = center 1, match:class ^(vlc)$
windowrule = opaque 1, match:class ^(vlc)$
windowrule = dim_around 1, match:class ^(vlc)$

#windowrule = float 1, match:class ^(kitty)$
#windowrule = size 1000 700, match:class ^(kitty)$
#windowrule = center 1, match:class ^(kitty)$

windowrule = float 1, match:class ^(mpv)$
windowrule = size 1000 700, match:class ^(mpv)$
windowrule = center 1, match:class ^(mpv)$
windowrule = opaque 1, match:class ^(mpv)$
windowrule = dim_around 1, match:class ^(mpv)$

windowrule = float 1, match:class ^(org.kde.gwenview)$
windowrule = size 1000 700, match:class ^(org.kde.gwenview)$
windowrule = center 1, match:class ^(org.kde.gwenview)$
windowrule = opaque 1, match:class ^(org.kde.gwenview)$
windowrule = dim_around 1, match:class ^(org.kde.gwenview)$

# =========================
# KEYBINDS
# =========================
$mainMod = SUPER

# Apps
bind = $mainMod, Q, exec, kitty
bind = $mainMod, E, exec, thunar
bind = $mainMod, SPACE, exec, /home/venom/.config/rofi/scripts/launcher.sh
bind = SUPER SHIFT, E, exec, /home/venom/.config/rofi/scripts/powermenu.sh
bind = $mainMod, B, exec, zen-browser
bind = $mainMod, L, exec, localsend

# Window controls
bind = ALT, grave, killactive                         # Alt+` to kill window
bind = $mainMod, F, fullscreen
bind = $mainMod, T, togglefloating
bind = ALT, Tab, cyclenext                            # Alt+Tab cycle windows
bind = ALT, Tab, alterzorder, top
# Move focus (arrows)
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Move windows
bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d

# Mouse move/resize floating windows
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Wallpaper
bind = $mainMod, W, exec, ~/.config/rofi/scripts/wallpaper.sh

#Themes
bind = $mainMod SHIFT, T, exec, ~/.config/rofi/scripts/theme-switcher.sh

# Screenshot
bind = , Print, exec, hyprshot -m region --raw | satty --filename -

# Clipboard history
bind = $mainMod, V, exec, ~/.config/rofi/scripts/clipboard.sh

# Game mode
bind = $mainMod, G, exec, hyprctl --batch "keyword animations:enabled 0; keyword decoration:blur:enabled 0"
bind = $mainMod SHIFT, G, exec, hyprctl --batch "keyword animations:enabled 1; keyword decoration:blur:enabled 1"

# Volume
bind = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bind = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle

# Brightness
bind = , XF86MonBrightnessUp, exec, brightnessctl set 5%+
bind = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

#Emoji
bind = SUPER, period, exec, ~/.config/rofimoji/emoji.sh

